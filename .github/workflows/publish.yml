name: Publish to PyPI

# Triggers when python-semantic-release pushes a version tag (e.g. v1.2.3).
# Can also be triggered manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # optional: gate behind a GitHub environment for approvals
    permissions:
      id-token: write          # required for OIDC trusted publishing (no token secret needed)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing (OIDC) is used when no password is supplied.
        # To use a token instead, add PYPI_TOKEN to your repository secrets
        # and uncomment the line below:
        # with:
        #   password: ${{ secrets.PYPI_TOKEN }}
