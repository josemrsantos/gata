name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create tags and GitHub Releases
      id-token: write       # OIDC token for trusted PyPI publishing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so semantic-release can read all commits

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.12.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Build only after semantic-release has written the new version into
      # pyproject.toml and __version__.py, so the dist carries the correct version.
      - name: Build distribution
        if: steps.release.outputs.released == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
