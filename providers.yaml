# providers.yaml — LLM provider and model assignments for each agent role.
#
# Each panelist slot is an ordered fallback chain: the first model is tried first;
# if it fails, the next is tried, and so on across provider boundaries.
# The aggregator entry works the same way.
#
# Valid provider names: claude, gemini, grok
# This file is optional — omitting it uses the built-in defaults shown below.
#
# Per-provider call timeout (Spec 036):
#   Add an optional `timeout` field (seconds, float) to any entry to enforce a
#   per-call limit. If the provider exceeds that limit it is abandoned and the
#   next provider in the chain is tried with its own fresh budget.
#   Omit `timeout` (as below) to keep the current unbounded behaviour.
#   Recommended starting values based on observed latencies:
#     claude-sonnet-4-6:  timeout: 25.0
#     grok-3:             timeout: 20.0
#     grok-3-mini:        timeout: 12.0
#     gemini-2.5-flash:   timeout: 15.0
#     gemini-2.5-pro:     timeout: 30.0

panelists:
  - - provider: claude
      model: claude-sonnet-4-6
    - provider: gemini
      model: gemini-2.5-flash
    - provider: grok
      model: grok-3-mini
  - - provider: grok
      model: grok-3-mini
    - provider: gemini
      model: gemini-2.5-flash
    - provider: claude
      model: claude-haiku-4-5-20251001
  - - provider: gemini
      model: gemini-2.5-flash
    - provider: grok
      model: grok-3-mini
    - provider: claude
      model: claude-haiku-4-5-20251001

aggregator:
  - provider: grok
    model: grok-3
  - provider: claude
    model: claude-sonnet-4-6
  - provider: gemini
    model: gemini-2.5-pro
